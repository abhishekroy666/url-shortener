# Database Connection URL (Saves to a folder named 'data' in your project root)
spring.datasource.url=jdbc:h2:file:./data/url_shortener_db;DB_CLOSE_DELAY=-1;NON_KEYWORDS=KEY

# Driver and Credentials
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=username
spring.datasource.password=password

# Hibernate Configuration (Updates tables cleanly without wiping existing data)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Force enable the web console dashboard
spring.h2.console.enabled=true

# Set the access path explicitly (ensure there are no leading/trailing spaces)
spring.h2.console.path=/h2-console

# Define the cache provider explicitly
spring.cache.type=caffeine

# Configure cache naming rules, sizing ceilings, and expiration lifetimes
# 'urls' is our cache name. Max 10,000 links stored. Items evaporate 2 hours after creation.
spring.cache.caffeine.spec=initialCapacity=100,maximumSize=10000,expireAfterWrite=2h